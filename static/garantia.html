<form>
  <div>
    <label for="nombre_completo">Nombre completo</label>
    <input type="text" id="nombre_completo" name="nombre_completo" placeholder="Juan Ruiz Ruiz (p.ej.)" required>
  </div>
  <div>
    <label for="">Correo-e de contacto</label>
    <input type="email" id="" name="" placeholder="ejemplo@ejemplo.es" required>
  </div>
  <div>
    <label for="_1">Número de teléfono</label>
    <input type="number" id="_1" name="_1" placeholder="612634656 (p.ej.)" required min="9" max="9">
  </div>
  <div>
    <label for="_2">Título</label>
    <input type="text" id="_2" name="_2" placeholder="Describe brevemente tu incidencia" required>
  </div>
  <div>
    <label for="_3">Descripción</label>
    <input type="text" id="_3" name="_3" placeholder="¿Cuál es el problema? Extiéndete tanto como quieras." required>
  </div>
  <div>
    <label for="_4">¿Qué dispositivo tienes?</label>
    <select id="_4" name="_4" required>
      <option value="option1">ArchPhone (1)</option>
      <option value="option2">ArchPhone (1) Pro</option>
      <option value="option3">ArchPhone Air</option>
      <option value="option4">ArchPhone Fold</option>
    </select>
  </div>
  <div>
    <label for="imei_de_tu_dispositivo">IMEI de tu dispositivo</label>
    <input type="text" id="imei_de_tu_dispositivo" name="imei_de_tu_dispositivo" placeholder="Introduce el IMEI de la SIM 1" required minlength="15" maxlength="15">
  </div>
  <div>
    <label for="_5">Verificación</label>
    <input type="checkbox" id="_5_0" name="_5" value="option1">
    <label for="_5_0">Entiendo, comprendo y afirmo que todos los datos que he introducido son correctos.</label>
  </div>
  <button type="submit">Submit</button>
</form>
