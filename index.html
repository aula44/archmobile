<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Archmobile | El paradigma de la privacidad">
    <title>Archmobile - Linux Phones</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <header>
        <!-- logo archmobile -->
        <div class="logo">
            <img src="assets/pequeño.png" alt="Archmobile">
        </div>
        
        <!-- navbar -->
        <nav class="nav-desktop">
            <ul>
                <li><a href="#">Sobre nosotros</a></li>
                <li><a href="#">ArchmobileOS</a></li>
                <li><a href="#">Garantía</a></li>
            </ul>
        </nav>

        <!-- boton "inicio de sesion" (que realmente no hay na de na, esto es mas estatico que un muerto) -->
        <div class="btn_iniciosesion nav-desktop">
            <a href="#"><i class="fa-solid fa-circle-user fa-fw"></i> Inicia Sesión</a>
        </div>
    </header>

    <!-- banner principal -->
    <section class="marquesina">
        <!-- textos y boton de explorar -->
        <div class="marquesina_textos">
            <h2>Nuestra misión es tu</h2>
            <h1>privacidad.</h1>
            <a href="#" class="btn_modelos"><i class="fa-solid fa-magnifying-glass fa-fw"></i> Explora nuestros modelos</a>
        </div>

        <!-- capturas de pantalla archmobileOS -->
        <div class="marquesina_img">
            <img src="assets/banner.png" alt="Pantalla de inicio de ArchmobileOS">
        </div>
    </section>

    <section class="tabla">
        <div class="parent">  <!-- listado modelos con grid css -->
            
            <div class="div1">
                <h1>Nuestros modelos</h1>
            </div>
            
            <div class="div2">  <!-- primer modelo -->
                <div class="card">
                    <img src="img/pc.jpg" alt="Parte trasera del ArchPhone (1)">
                    <div class="price">
                        <h2>ArchPhone (1)</h2>
                    </div>
                </div>
            </div>

            <div class="div2">  <!-- segundo modelo -->
                <div class="card">
                    <img src="img/pc.jpg" alt="Parte trasera del ArchPhone (1) Pro">
                    <div class="price">
                        <h2>ArchPhone (1) Pro</h2>
                    </div>
                </div>
            </div>

            <div class="div2">  <!-- tercer modelo -->
                <div class="card">
                    <img src="img/pc.jpg" alt="Parte trasera del ArchPhone Air">
                    <div class="price">
                        <h2>ArchPhone Air</h2>
                    </div>
                </div>
            </div>

            <div class="div2">  <!-- cuarto modelo -->
                <div class="card">
                    <img src="img/pc.jpg" alt="Parte trasera del ArchPhone Fold">
                    <div class="price">
                        <h2>ArchPhone Fold</h2>
                    </div>
                </div>
            </div>
            
        </div>
    </section>
</body>
</html>
